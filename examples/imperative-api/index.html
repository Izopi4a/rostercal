<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>imperative-api — rostercal</title>
    <link rel="stylesheet" href="../_shared/demo-frame.css" />
    <style>
      .log {
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        font-size: 0.8rem;
        padding: 0.75rem;
        margin-top: 1rem;
        background: #f5f5f5;
        border-radius: 4px;
        max-height: 12rem;
        overflow-y: auto;
        white-space: pre-wrap;
      }
      @media (prefers-color-scheme: dark) {
        .log {
          background: #1f1f1f;
          color: #ddd;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <a class="back" href="../">← all demos</a>
      <h1>imperative-api</h1>
      <p>
        Buttons drive the calendar via <code>addEvent</code>, <code>removeEvent</code>,
        <code>next</code>, <code>prev</code>, <code>today</code>, etc. The log below shows
        listener payloads. Click an empty day cell or an event to trigger
        <code>dateClick</code> / <code>eventClick</code>.
      </p>
    </header>
    <div class="toolbar">
      <button type="button" id="prev">← prev</button>
      <button type="button" id="today">today</button>
      <button type="button" id="next">next →</button>
      <button type="button" id="add">add random event</button>
      <button type="button" id="remove">remove last event</button>
      <button type="button" id="clear">clear log</button>
    </div>
    <div id="cal"></div>
    <pre class="log" id="log"></pre>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
