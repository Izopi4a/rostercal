<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>crud-function-form — rostercal</title>
    <link rel="stylesheet" href="../_shared/demo-frame.css" />
    <style>
      .log {
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        font-size: 0.8rem;
        padding: 0.75rem;
        margin-top: 1rem;
        background: #f5f5f5;
        border-radius: 4px;
        max-height: 12rem;
        overflow-y: auto;
        white-space: pre-wrap;
      }
      @media (prefers-color-scheme: dark) {
        .log {
          background: #1f1f1f;
          color: #ddd;
        }
      }
      code {
        font: 0.85rem ui-monospace, monospace;
        background: rgba(0, 0, 0, 0.06);
        padding: 1px 4px;
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <header>
      <a class="back" href="../">← all demos</a>
      <h1>crud-function-form</h1>
      <p>
        Each operation is a plain function — bypasses the URL/fetcher entirely. Backend has its own
        DTO shape (<code>{ uuid, name, at, untilAt }</code>); <code>fromServer</code> and
        <code>toServer</code> translate to/from <code>RosterEvent</code>.
      </p>
    </header>
    <div class="toolbar">
      <button type="button" id="add">Add event</button>
    </div>
    <div id="cal"></div>
    <pre class="log" id="log"></pre>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
